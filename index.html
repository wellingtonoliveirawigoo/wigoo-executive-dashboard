
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wigoo Executive Dashboard</title>
    <link rel="icon" href="https://www.wigoo.com.br/icon.ico?118911a3cf296aa2" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              wigoo: {
                primary: '#FF6B35',
                secondary: '#1E1E1E',
                accent: '#FF8C5A',
                dark: '#0D0D0D',
                light: '#FFFFFF',
                gray: '#2A2A2A',
                'gray-light': '#3D3D3D',
                success: '#4CAF50',
                danger: '#FF5252',
              }
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            backgroundImage: { 'wigoo-gradient': 'linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%)' }
          }
        }
      }
    </script>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease; }
      #root { flex: 1; display: flex; flex-direction: column; }
      
      @media print {
        @page { 
          size: A4 landscape; 
          margin: 0; 
        }
        
        .no-print, .no-print-section, header, footer, button, nav, [role="button"], textarea, .admin-btn { 
          display: none !important; 
        }
        
        body, html { 
          background-color: white !important; 
          color: black !important; 
          margin: 0 !important; 
          padding: 0 !important;
          width: 297mm !important; /* A4 Landscape width */
          height: auto !important;
          -webkit-print-color-adjust: exact !important; 
          print-color-adjust: exact !important; 
        }

        #root {
          width: 1200px !important;
          margin: 0 auto !important;
          padding: 40px !important;
          transform: scale(0.9);
          transform-origin: top left;
        }

        main {
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
          max-width: none !important;
          display: block !important;
        }

        .container {
          max-width: none !important;
          width: 100% !important;
          padding: 0 !important;
        }

        .card, section, .metric-card {
          break-inside: avoid !important;
          page-break-inside: avoid !important;
          margin-bottom: 30px !important;
          box-shadow: none !important;
          border: 1px solid #eee !important;
          background-color: white !important;
        }

        /* Forçar grid para não quebrar */
        .grid {
          display: grid !important;
        }

        h2, h3, h4 {
          break-after: avoid !important;
          page-break-after: avoid !important;
        }

        .recharts-responsive-container {
          width: 100% !important;
          height: 300px !important;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #FF8C5A; }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 107, 53, 0.4); border-radius: 10px; }

      .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .modal-blur { backdrop-filter: blur(12px) saturate(180%); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
  </head>
  <body class="bg-gray-50 dark:bg-wigoo-dark text-gray-900 dark:text-white font-sans antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
