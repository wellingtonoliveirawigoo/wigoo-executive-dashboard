
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wigoo Executive Dashboard</title>
    <link rel="icon" href="https://www.wigoo.com.br/icon.ico?118911a3cf296aa2" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              wigoo: {
                primary: '#FF6B35',
                secondary: '#1E1E1E',
                accent: '#FF8C5A',
                dark: '#0D0D0D',
                light: '#FFFFFF',
                gray: '#2A2A2A',
                'gray-light': '#3D3D3D',
                success: '#4CAF50',
                danger: '#FF5252',
              }
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            backgroundImage: { 'wigoo-gradient': 'linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%)' }
          }
        }
      }
    </script>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease; }
      #root { flex: 1; display: flex; flex-direction: column; }
      
      /* ═══════════════════════════════════════════════════════════════
         WIGOO PDF EXPORT — ONE-PAGE CONTINUOUS
         @page size:auto → PDF fica tão alto quanto o conteúdo
         Nenhuma quebra forçada, tudo em uma única folha contínua
      ═══════════════════════════════════════════════════════════════ */
      @media print {
        @page {
          size: auto;
          margin: 12mm 14mm;
        }

        /* ── Reset global ── */
        *, *::before, *::after {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          color-adjust: exact !important;
        }

        html, body {
          background: #ffffff !important;
          color: #111827 !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          height: auto !important;
          font-size: 11px !important;
        }

        /* ── Forçar light mode no PDF ── */
        .dark, .dark * {
          background-color: transparent !important;
          color: #111827 !important;
          border-color: #e5e7eb !important;
        }

        /* ── Remover tudo que não é conteúdo ── */
        .no-print, header, footer,
        button:not(.print-visible),
        nav, textarea, input,
        .admin-btn, .modal-blur,
        [data-no-print],
        .fixed, .sticky {
          display: none !important;
        }

        /* ── Layout root ── */
        #root, main {
          display: block !important;
          width: 100% !important;
          max-width: none !important;
          padding: 0 !important;
          margin: 0 !important;
          background: white !important;
          overflow: visible !important;
        }

        .container, .max-w-\[1200px\] {
          max-width: none !important;
          width: 100% !important;
          padding: 0 !important;
          margin: 0 auto !important;
        }

        /* ── Proibir qualquer quebra de página ── */
        * {
          page-break-before: avoid !important;
          page-break-after: avoid !important;
          page-break-inside: avoid !important;
          break-before: avoid !important;
          break-after: avoid !important;
          break-inside: avoid !important;
        }

        /* ── Cards e seções ── */
        .card, section, .metric-card, .campaign-table, .creative-item {
          border: 1px solid #e5e7eb !important;
          border-radius: 16px !important;
          box-shadow: none !important;
          background: #ffffff !important;
          overflow: visible !important;
          margin-bottom: 20px !important;
        }

        /* ── Grids: criativos ficam em 2 colunas no PDF ── */
        .print-creative-grid {
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 16px !important;
          width: 100% !important;
        }

        /* ── MetricCards: 4 colunas ── */
        .metric-grid {
          display: grid !important;
          grid-template-columns: repeat(4, 1fr) !important;
          gap: 12px !important;
        }

        /* ── Textos coloridos: garantir visibilidade ── */
        .text-gray-400, .text-gray-500 { color: #6b7280 !important; }
        .text-gray-900 { color: #111827 !important; }
        .text-white { color: #111827 !important; }
        .text-wigoo-primary, [class*="text-wigoo"] { color: #FF6B35 !important; }
        .text-emerald-500, .text-emerald-600 { color: #059669 !important; }
        .text-rose-500 { color: #e11d48 !important; }
        .text-amber-500 { color: #d97706 !important; }
        .text-blue-500 { color: #3b82f6 !important; }

        /* ── Backgrounds coloridos ── */
        .bg-wigoo-primary, [class*="bg-wigoo-primary"] { background-color: #FF6B35 !important; }
        .bg-emerald-500 { background-color: #10b981 !important; }
        .bg-amber-500 { background-color: #f59e0b !important; }
        .bg-rose-500 { background-color: #f43f5e !important; }
        .bg-gray-50, .bg-gray-100 { background-color: #f9fafb !important; }
        [class*="dark:bg-"] { background-color: transparent !important; }

        /* ── Gradiente no topo dos cards ── */
        .bg-wigoo-gradient { background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%) !important; }

        /* ── Barras de progress (breakdown scores) ── */
        .h-5.bg-\[\#3AB09E\] { background-color: #3AB09E !important; }

        /* ── Ocultar scrollbars e animações ── */
        .overflow-y-auto, .overflow-x-auto { overflow: visible !important; max-height: none !important; }
        .animate-pulse, .animate-spin { animation: none !important; }
        .animate-in { animation: none !important; opacity: 1 !important; transform: none !important; }

        /* ── Recharts ── */
        .recharts-responsive-container {
          width: 100% !important;
          height: 280px !important;
        }

        /* ── Bordas coloridas ── */
        [class*="border-wigoo-primary"] { border-color: #FF6B35 !important; }
        [class*="border-l-4"] { border-left-width: 4px !important; }

        /* ── Cabeçalho do relatório PDF ── */
        .pdf-report-header {
          display: flex !important;
          align-items: center !important;
          justify-content: space-between !important;
          padding: 10px 0 16px !important;
          border-bottom: 2px solid #FF6B35 !important;
          margin-bottom: 20px !important;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #FF8C5A; }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 107, 53, 0.4); border-radius: 10px; }

      .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .modal-blur { backdrop-filter: blur(12px) saturate(180%); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
  </head>
  <body class="bg-gray-50 dark:bg-wigoo-dark text-gray-900 dark:text-white font-sans antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
