
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wigoo Executive Dashboard</title>
    <link rel="icon" href="https://www.wigoo.com.br/icon.ico?118911a3cf296aa2" type="image/x-icon">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              wigoo: {
                primary: '#FF6B35',
                secondary: '#1E1E1E',
                accent: '#FF8C5A',
                dark: '#0D0D0D',
                light: '#FFFFFF',
                gray: '#2A2A2A',
                'gray-light': '#3D3D3D',
                success: '#4CAF50',
                danger: '#FF5252',
              }
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            backgroundImage: { 'wigoo-gradient': 'linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%)' }
          }
        }
      }
    </script>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; transition: background-color 0.3s ease; }
      #root { flex: 1; display: flex; flex-direction: column; }
      
      @media print {
        @page { 
          size: A4 portrait; 
          margin: 15mm; 
        }
        
        /* Reset de Cores para Impressão Profissional */
        body, html, #root, main { 
          background-color: white !important; 
          color: #111 !important; 
          margin: 0 !important; 
          padding: 0 !important;
          width: 100% !important;
          height: auto !important;
          -webkit-print-color-adjust: exact !important; 
          print-color-adjust: exact !important; 
        }

        /* Esconder UI Irrelevante */
        .no-print, .no-print-section, header, footer, button, nav, [role="button"], 
        textarea, .admin-btn, .modal-blur, .fixed, .sticky { 
          display: none !important; 
        }

        /* Layout de Relatório Excecutivo */
        #root {
          width: 100% !important;
          max-width: none !important;
          margin: 0 !important;
          padding: 0 !important;
          display: block !important;
        }

        main {
          width: 100% !important;
          max-width: none !important;
          padding: 0 !important;
          margin: 0 !important;
          gap: 40px !important;
          display: block !important;
        }

        /* Container de 1200px local vira 100% no papel */
        .container, .max-w-\[1200px\] {
          max-width: none !important;
          width: 100% !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        /* Garantir que seções não quebrem no meio */
        .card, section, .metric-card, .campaign-table, .creative-item, table, tr {
          break-inside: avoid !important;
          page-break-inside: avoid !important;
          margin-bottom: 40px !important;
          position: relative !important;
          display: block !important;
          border: 1px solid #eee !important;
          border-radius: 12px !important;
          box-shadow: none !important;
          background: white !important;
          overflow: visible !important;
        }

        /* Títulos sempre juntos do conteúdo seguinte */
        h1, h2, h3, h4, h5 {
          break-after: avoid !important;
          page-break-after: avoid !important;
          color: #000 !important;
          margin-top: 20px !important;
        }

        /* Forçar Grids e Flex para ocupar largura total */
        .grid, .flex {
          display: block !important; /* Colunar no PDF para evitar apertar demais */
          width: 100% !important;
        }

        .grid-cols-1, .grid-cols-2, .grid-cols-3, .grid-cols-4 {
          grid-template-columns: 1fr !important;
        }

        /* Exceção para mini-cartões (MetricCards) que podem ficar lado a lado */
        .metric-grid {
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 15px !important;
        }

        /* Ajuste de Gráficos Recharts */
        .recharts-responsive-container {
          width: 100% !important;
          height: 350px !important;
          break-inside: avoid !important;
        }

        /* Forçar texto visível */
        .text-gray-400, .text-gray-500, .dark\:text-white\/40 {
          color: #666 !important;
        }
        
        .dark {
          background-color: white !important;
          color: black !important;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #FF8C5A; }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 107, 53, 0.4); border-radius: 10px; }

      .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .modal-blur { backdrop-filter: blur(12px) saturate(180%); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
  </head>
  <body class="bg-gray-50 dark:bg-wigoo-dark text-gray-900 dark:text-white font-sans antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
